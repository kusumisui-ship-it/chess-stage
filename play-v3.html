<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08090b">
  <title>CHESS STAGE — CPU SAVE TEST</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #08090b;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100dvh;
      border: 0;
      background: #08090b;
    }
  </style>
</head>
<body>
  <iframe
    id="easyFrame"
    src="./easy.html?v=cpu-save-v3"
    title="CHESS STAGE"
  ></iframe>

  <script>
    const easyFrame = document.getElementById("easyFrame");
    const buildId = "cpu-save-v3";
    let indexCacheBusted = false;
    let installTimer = null;

    function injectCpuSavePatch(gameDocument) {
      if (
        !gameDocument ||
        !gameDocument.body ||
        gameDocument.body.dataset.cpuSavePatch === buildId
      ) {
        return false;
      }

      const flipButton = gameDocument.getElementById("flipBoardButton");
      const difficultyButton = gameDocument.getElementById("difficultyButton");

      if (!flipButton || !difficultyButton) return false;

      gameDocument.body.dataset.cpuSavePatch = buildId;

      const patch = gameDocument.createElement("script");
      patch.textContent = `
        (() => {
          const saveKey = "chessStageSavedCpuGameV1";
          const originalCommitMoveV3 = commitMove;
          const originalShowResultV3 = showResult;

          const originalFlipButton = document.getElementById("flipBoardButton");
          const undoButton = originalFlipButton.cloneNode(true);
          originalFlipButton.replaceWith(undoButton);

          undoButton.dataset.cpuUndoReady = "v3";
          undoButton.textContent = "↶";
          undoButton.setAttribute("aria-label", "1ターン戻す");
          undoButton.style.opacity = "1";
          undoButton.style.cursor = "pointer";

          boardFlipped = false;
          renderBoard();

          function removeSavedGame() {
            try {
              localStorage.removeItem(saveKey);
            } catch (error) {
              console.warn("Saved game could not be removed", error);
            }
          }

          function saveCurrentGame() {
            try {
              if (
                !game ||
                game.over ||
                !game.history ||
                game.history.length === 0
              ) {
                removeSavedGame();
                return;
              }

              const difficultyState = document.getElementById("difficultyState");
              const difficulty = difficultyState
                ? difficultyState.textContent
                : "EASY";

              localStorage.setItem(
                saveKey,
                JSON.stringify({
                  version: 1,
                  savedAt: Date.now(),
                  difficulty,
                  game
                })
              );
            } catch (error) {
              console.warn("Game could not be saved", error);
            }
          }

          window.chessStageSaveCpuGame = saveCurrentGame;

          commitMove = function patchedCommitMoveV3(move) {
            originalCommitMoveV3(move);
            setTimeout(saveCurrentGame, 0);
          };

          showResult = function patchedShowResultV3(end) {
            removeSavedGame();
            originalShowResultV3(end);
          };

          const difficultyButton = document.getElementById("difficultyButton");
          if (difficultyButton) {
            difficultyButton.addEventListener("click", () => {
              setTimeout(saveCurrentGame, 0);
            });
          }

          if (localMatchButton) {
            localMatchButton.addEventListener("click", removeSavedGame, true);
          }

          if (rematchButton) {
            rematchButton.addEventListener("click", removeSavedGame, true);
          }

          function cleanMove(move) {
            return {
              from: move.from,
              to: move.to,
              promotion: move.promotion,
              enPassant: move.enPassant,
              castle: move.castle
            };
          }

          function undoPlayerTurn() {
            if (!game || !game.history || game.history.length === 0) {
              showToast("NO TURN TO UNDO");
              return;
            }

            if (pendingPromotion) {
              showToast("FINISH PROMOTION FIRST");
              return;
            }

            if (game.over) {
              showToast("GAME ALREADY ENDED");
              return;
            }

            const removeCount = game.turn === "b" || cpuThinking ? 1 : 2;
            const keepCount = Math.max(0, game.history.length - removeCount);
            const retainedMoves = game.history
              .slice(0, keepCount)
              .map(cleanMove);

            gameSessionId += 1;
            clearGameTimers();
            cpuThinking = false;
            selectedSquare = null;
            legalTargets = [];
            pendingPromotion = null;
            hidePromotion();
            hideResult();

            let rebuiltGame = createGameFromFen(START_FEN);
            retainedMoves.forEach((move) => {
              rebuiltGame = applyMove(rebuiltGame, move);
            });

            game = rebuiltGame;
            boardFlipped = false;
            renderBoard();
            saveCurrentGame();
            showToast(removeCount === 1 ? "MOVE UNDONE" : "TURN UNDONE");
          }

          undoButton.addEventListener("click", undoPlayerTurn);

          function restoreSavedGame() {
            let savedGame = null;

            try {
              savedGame = JSON.parse(localStorage.getItem(saveKey));
            } catch (error) {
              console.warn("Saved game could not be read", error);
              removeSavedGame();
              return;
            }

            if (
              !savedGame ||
              !savedGame.game ||
              !Array.isArray(savedGame.game.board) ||
              !Array.isArray(savedGame.game.history) ||
              savedGame.game.history.length === 0 ||
              savedGame.game.over
            ) {
              return;
            }

            const difficultyState = document.getElementById("difficultyState");
            if (
              savedGame.difficulty === "NORMAL" &&
              difficultyState &&
              difficultyState.textContent !== "NORMAL" &&
              difficultyButton
            ) {
              difficultyButton.click();
            }

            gameSessionId += 1;
            clearGameTimers();
            game = savedGame.game;
            game.over = false;
            selectedSquare = null;
            legalTargets = [];
            pendingPromotion = null;
            cpuThinking = false;
            boardFlipped = false;
            hidePromotion();
            hideResult();

            homeScreen.classList.remove("active");
            gameScreen.classList.add("active");
            renderBoard();
            saveCurrentGame();
            showToast("GAME RESTORED");

            if (game.turn === "b") {
              scheduleCpuMove();
            }
          }

          setTimeout(restoreSavedGame, 0);
        })();
      `;

      gameDocument.body.appendChild(patch);
      return true;
    }

    function installCpuSave() {
      try {
        const easyDocument = easyFrame.contentDocument;
        if (!easyDocument) return;

        const gameFrame = easyDocument.getElementById("gameFrame");
        if (!gameFrame) return;

        if (!indexCacheBusted) {
          indexCacheBusted = true;
          gameFrame.src = "./index.html?v=" + buildId;
          return;
        }

        const gameDocument = gameFrame.contentDocument;
        if (injectCpuSavePatch(gameDocument)) {
          clearInterval(installTimer);
          installTimer = null;
        }
      } catch (error) {
        console.warn("CPU save controls are still loading", error);
      }
    }

    easyFrame.addEventListener("load", installCpuSave);
    installTimer = setInterval(installCpuSave, 100);

    setTimeout(() => {
      if (installTimer) {
        clearInterval(installTimer);
        installTimer = null;
      }
    }, 10000);
  </script>
</body>
</html>
