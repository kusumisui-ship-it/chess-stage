<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08090b">
  <title>CHESS STAGE — PLAY</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #08090b;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100dvh;
      border: 0;
      background: #08090b;
    }
  </style>
</head>
<body>
  <iframe id="easyFrame" src="./easy.html" title="CHESS STAGE"></iframe>

  <script>
    const easyFrame = document.getElementById("easyFrame");

    function installCpuControls() {
      const easyDocument = easyFrame.contentDocument;
      if (!easyDocument) return;

      const gameFrame = easyDocument.getElementById("gameFrame");
      if (!gameFrame) return;

      function patchGameFrame() {
        const gameDocument = gameFrame.contentDocument;
        if (!gameDocument || !gameDocument.body) return;

        const patch = gameDocument.createElement("script");
        patch.textContent = `
          (() => {
            const originalFlipButton = document.getElementById("flipBoardButton");
            if (!originalFlipButton) return;

            if (originalFlipButton.dataset.cpuUndoReady === "true") {
              boardFlipped = false;
              renderBoard();
              return;
            }

            const undoButton = originalFlipButton.cloneNode(true);
            originalFlipButton.replaceWith(undoButton);

            undoButton.dataset.cpuUndoReady = "true";
            undoButton.textContent = "↶";
            undoButton.setAttribute("aria-label", "1ターン戻す");
            undoButton.removeAttribute("aria-disabled");
            undoButton.style.opacity = "1";
            undoButton.style.cursor = "pointer";

            boardFlipped = false;
            renderBoard();

            function cleanMove(move) {
              return {
                from: move.from,
                to: move.to,
                promotion: move.promotion,
                enPassant: move.enPassant,
                castle: move.castle
              };
            }

            function undoPlayerTurn() {
              if (!game || !game.history || game.history.length === 0) {
                showToast("NO TURN TO UNDO");
                return;
              }

              if (pendingPromotion) {
                showToast("FINISH PROMOTION FIRST");
                return;
              }

              if (game.over) {
                showToast("GAME ALREADY ENDED");
                return;
              }

              const removeCount = game.turn === "b" || cpuThinking ? 1 : 2;
              const keepCount = Math.max(0, game.history.length - removeCount);
              const retainedMoves = game.history
                .slice(0, keepCount)
                .map(cleanMove);

              gameSessionId += 1;
              clearGameTimers();
              cpuThinking = false;
              selectedSquare = null;
              legalTargets = [];
              pendingPromotion = null;
              hidePromotion();
              hideResult();

              let rebuiltGame = createGameFromFen(START_FEN);
              retainedMoves.forEach((move) => {
                rebuiltGame = applyMove(rebuiltGame, move);
              });

              game = rebuiltGame;
              boardFlipped = false;
              renderBoard();
              showToast(removeCount === 1 ? "MOVE UNDONE" : "TURN UNDONE");
            }

            undoButton.addEventListener("click", undoPlayerTurn);
          })();
        `;

        gameDocument.body.appendChild(patch);
      }

      gameFrame.addEventListener("load", patchGameFrame);
      patchGameFrame();
    }

    easyFrame.addEventListener("load", installCpuControls);
  </script>
</body>
</html>
