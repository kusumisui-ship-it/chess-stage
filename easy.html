<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08090b">
  <title>CHESS STAGE — EASY CPU</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #08090b;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100dvh;
      border: 0;
      background: #08090b;
    }
  </style>
</head>
<body>
  <iframe id="gameFrame" src="./index.html" title="CHESS STAGE"></iframe>

  <script>
    const gameFrame = document.getElementById("gameFrame");

    gameFrame.addEventListener("load", () => {
      const frameDocument = gameFrame.contentDocument;
      const patch = frameDocument.createElement("script");

      patch.textContent = `
        (() => {
          const originalCpuMove = cpuMove;
          const originalCommitMove = commitMove;
          const originalRenderBoard = renderBoard;
          let easyMode = true;
          let lastMove = null;

          const utilityStyle = document.createElement("style");
          utilityStyle.textContent =
            ".square.last-move {" +
            "box-shadow:" +
            "inset 0 0 0 2px rgba(211, 197, 151, 0.56)," +
            "inset 0 0 24px rgba(211, 197, 151, 0.22);" +
            "}" +
            ".move-history-strip {" +
            "display:flex;align-items:center;gap:10px;" +
            "width:min(100%,620px);min-height:28px;" +
            "margin:2px auto 0;padding:0 6px;" +
            "border-top:1px solid rgba(255,255,255,0.07);" +
            "border-bottom:1px solid rgba(255,255,255,0.07);" +
            "color:rgba(243,242,238,0.62);overflow:hidden;" +
            "}" +
            ".move-history-label {" +
            "flex:0 0 auto;color:rgba(243,242,238,0.34);" +
            "font-size:7px;font-weight:700;letter-spacing:0.22em;" +
            "}" +
            ".move-history-value {" +
            "min-width:0;overflow:hidden;text-overflow:ellipsis;" +
            "white-space:nowrap;font-size:9px;letter-spacing:0.08em;" +
            "}";
          document.head.appendChild(utilityStyle);

          const boardStage = document.querySelector(".board-stage");
          let moveHistoryValue = null;

          if (boardStage && !document.getElementById("moveHistoryStrip")) {
            const historyStrip = document.createElement("div");
            historyStrip.id = "moveHistoryStrip";
            historyStrip.className = "move-history-strip";
            historyStrip.innerHTML =
              '<span class="move-history-label">MOVES</span>' +
              '<span id="moveHistoryValue" class="move-history-value">—</span>';
            boardStage.insertAdjacentElement("afterend", historyStrip);
            moveHistoryValue = document.getElementById("moveHistoryValue");
          }

          function formatMove(move, index) {
            const moveNumber = Math.floor(index / 2) + 1;
            const prefix = index % 2 === 0 ? moveNumber + ". " : "… ";

            if (move.castle) {
              const castleText = move.castle.toLowerCase() === "q"
                ? "O-O-O"
                : "O-O";
              return prefix + castleText;
            }

            const separator = move.capture ? "×" : "–";
            const promotion = move.promotion ? "=" + move.promotion : "";
            return prefix + move.from.toUpperCase() + separator +
              move.to.toUpperCase() + promotion;
          }

          function updateMoveHistory() {
            if (!moveHistoryValue) return;

            if (!game || !game.history || game.history.length === 0) {
              moveHistoryValue.textContent = "—";
              return;
            }

            const start = Math.max(0, game.history.length - 4);
            moveHistoryValue.textContent = game.history
              .slice(start)
              .map((move, offset) => formatMove(move, start + offset))
              .join("   ");
          }

          renderBoard = function patchedRenderBoard() {
            originalRenderBoard();
            updateMoveHistory();

            if (!game || !game.history || game.history.length === 0) {
              lastMove = null;
              return;
            }

            const latestMove = game.history[game.history.length - 1];
            lastMove = {
              from: latestMove.from,
              to: latestMove.to
            };

            [lastMove.from, lastMove.to].forEach((squareName) => {
              const square = document.querySelector(
                '.square[data-square="' + squareName + '"]'
              );
              if (square) square.classList.add("last-move");
            });
          };

          commitMove = function patchedCommitMove(move) {
            lastMove = {
              from: move.from,
              to: move.to
            };
            originalCommitMove(move);
          };

          const controls = document.querySelector(".game-controls");
          if (controls && !document.getElementById("difficultyButton")) {
            controls.style.gridTemplateColumns = "repeat(3, minmax(0, 1fr))";

            const difficultyButton = document.createElement("button");
            difficultyButton.id = "difficultyButton";
            difficultyButton.className = "control-button active";
            difficultyButton.type = "button";
            difficultyButton.innerHTML =
              '<span class="control-label">LEVEL</span>' +
              '<span id="difficultyState" class="control-value">EASY</span>';

            controls.insertBefore(difficultyButton, controls.lastElementChild);

            difficultyButton.addEventListener("click", () => {
              easyMode = !easyMode;
              difficultyButton.classList.toggle("active", easyMode);
              document.getElementById("difficultyState").textContent =
                easyMode ? "EASY" : "NORMAL";
              showToast(easyMode ? "CPU LEVEL — EASY" : "CPU LEVEL — NORMAL");
            });
          }

          cpuMove = function patchedCpuMove() {
            if (!easyMode) {
              originalCpuMove();
              return;
            }

            if (!game || game.over || game.turn !== "b") {
              cpuThinking = false;
              if (game) renderStatus();
              return;
            }

            try {
              const moves = legalMoves(game);

              if (!moves.length) {
                const end = gameEndState(game);
                game.over = end.over;
                cpuThinking = false;
                renderBoard();
                if (end.over) showResult(end);
                return;
              }

              const values = {
                P: 100,
                N: 320,
                B: 330,
                R: 500,
                Q: 900,
                K: 20000
              };

              function materialValue(state) {
                let score = 0;

                for (let r = 0; r < 8; r += 1) {
                  for (let c = 0; c < 8; c += 1) {
                    const piece = state.board[r][c];
                    if (!piece) continue;
                    const value = values[piece.type] || 0;
                    score += piece.color === "b" ? value : -value;
                  }
                }

                return score;
              }

              const scoredMoves = moves.map((move) => {
                const choice = {
                  ...move,
                  promotion: move.promotion ? "Q" : move.promotion
                };

                const afterCpu = applyMove(game, choice);
                const end = gameEndState(afterCpu);

                if (end.over && end.winner === "b") {
                  return { move: choice, score: 1000000 };
                }

                if (end.over) {
                  return { move: choice, score: 0 };
                }

                const whiteMoves = legalMoves(afterCpu);
                let worstReply = materialValue(afterCpu);

                if (isInCheck(afterCpu, "w")) {
                  worstReply += 24;
                }

                if (whiteMoves.length) {
                  worstReply = Infinity;

                  whiteMoves.forEach((whiteMove) => {
                    const whiteChoice = {
                      ...whiteMove,
                      promotion: whiteMove.promotion ? "Q" : whiteMove.promotion
                    };
                    const afterWhite = applyMove(afterCpu, whiteChoice);
                    const whiteEnd = gameEndState(afterWhite);
                    let replyScore = materialValue(afterWhite);

                    if (whiteEnd.over && whiteEnd.winner === "w") {
                      replyScore = -1000000;
                    } else if (whiteEnd.over) {
                      replyScore = 0;
                    }

                    worstReply = Math.min(worstReply, replyScore);
                  });
                }

                return { move: choice, score: worstReply };
              });

              scoredMoves.sort((a, b) => b.score - a.score);

              const poolSize = Math.min(
                scoredMoves.length,
                Math.max(4, Math.ceil(scoredMoves.length * 0.4))
              );
              const candidatePool = scoredMoves.slice(0, poolSize);
              const chosen = candidatePool[
                Math.floor(Math.random() * candidatePool.length)
              ].move;

              commitMove(chosen);
            } catch (error) {
              cpuThinking = false;
              console.error("Easy CPU move failed", error);
              renderStatus();
              showToast("CPU MOVE ERROR");
            }
          };
        })();
      `;

      frameDocument.body.appendChild(patch);
    });
  </script>
</body>
</html>
