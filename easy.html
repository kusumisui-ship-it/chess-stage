<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08090b">
  <title>CHESS STAGE — EASY CPU</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #08090b;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100dvh;
      border: 0;
      background: #08090b;
    }
  </style>
</head>
<body>
  <iframe
    id="gameFrame"
    src="./index.html?v=easy-integrated-v2"
    title="CHESS STAGE"
  ></iframe>

  <script>
    const gameFrame = document.getElementById("gameFrame");

    gameFrame.addEventListener("load", () => {
      const frameDocument = gameFrame.contentDocument;
      if (!frameDocument || !frameDocument.body) return;
      if (frameDocument.body.dataset.easyIntegrated === "v2") return;

      frameDocument.body.dataset.easyIntegrated = "v2";
      const patch = frameDocument.createElement("script");

      patch.textContent = `
        (() => {
          const originalCpuMove = cpuMove;
          const originalCommitMove = commitMove;
          const originalRenderBoard = renderBoard;
          const originalShowResult = showResult;

          const recordKey = "chessStageLocalRecordV1";
          const saveKey = "chessStageSavedCpuGameV3";

          let easyMode = true;
          let lastMove = null;
          let lastRecordedSessionId = null;
          let lastSavedSignature = "";
          let saveWatcher = null;
          let historyExpanded = false;

          const utilityStyle = document.createElement("style");
          utilityStyle.textContent =
            ".square.last-move {" +
            "box-shadow:" +
            "inset 0 0 0 2px rgba(211,197,151,0.56)," +
            "inset 0 0 24px rgba(211,197,151,0.22);" +
            "}" +
            ".move-history-strip {" +
            "display:flex;align-items:center;gap:10px;" +
            "width:min(100%,620px);min-height:28px;" +
            "margin:2px auto 0;padding:0 6px;" +
            "border-top:1px solid rgba(255,255,255,0.07);" +
            "border-bottom:1px solid rgba(255,255,255,0.07);" +
            "color:rgba(243,242,238,0.62);overflow:hidden;" +
            "}" +
            ".move-history-label {" +
            "flex:0 0 auto;color:rgba(243,242,238,0.34);" +
            "font-size:7px;font-weight:700;letter-spacing:0.22em;" +
            "}" +
            ".move-history-value {" +
            "min-width:0;overflow:hidden;text-overflow:ellipsis;" +
            "white-space:nowrap;font-size:9px;letter-spacing:0.08em;" +
            "}" +
            ".save-state {" +
            "flex:0 0 auto;margin-left:auto;white-space:nowrap;" +
            "color:rgba(183,167,121,0.82);" +
            "font-size:7px;font-weight:700;letter-spacing:0.14em;" +
            "}" +
            ".captured-pieces {" +
            "display:block;min-height:13px;margin-top:2px;" +
            "color:rgba(243,242,238,0.52);" +
            "font-family:Georgia,serif;font-size:12px;" +
            "line-height:1;letter-spacing:0.04em;white-space:nowrap;" +
            "}" +
            ".local-record {" +
            "display:block;margin-top:3px;" +
            "color:rgba(183,167,121,0.72);" +
            "font-size:7px;font-weight:700;letter-spacing:0.18em;" +
            "}";
          document.head.appendChild(utilityStyle);

          let localRecord = {
            wins: 0,
            losses: 0,
            draws: 0
          };

          try {
            const savedRecord = JSON.parse(localStorage.getItem(recordKey));
            if (savedRecord && typeof savedRecord === "object") {
              localRecord = {
                wins: Number(savedRecord.wins) || 0,
                losses: Number(savedRecord.losses) || 0,
                draws: Number(savedRecord.draws) || 0
              };
            }
          } catch (error) {
            console.warn("Local record could not be loaded", error);
          }

          const gameTitleBlock = document.querySelector(".game-title-block");
          let localRecordValue = document.getElementById("localRecordValue");

          if (gameTitleBlock && !localRecordValue) {
            localRecordValue = document.createElement("span");
            localRecordValue.id = "localRecordValue";
            localRecordValue.className = "local-record";
            gameTitleBlock.appendChild(localRecordValue);
          }

          function renderLocalRecord() {
            if (!localRecordValue) return;
            localRecordValue.textContent =
              "W " + localRecord.wins +
              "   L " + localRecord.losses +
              "   D " + localRecord.draws;
          }

          function saveLocalRecord() {
            try {
              localStorage.setItem(recordKey, JSON.stringify(localRecord));
            } catch (error) {
              console.warn("Local record could not be saved", error);
            }
          }

          renderLocalRecord();

          const boardStage = document.querySelector(".board-stage");
          let moveHistoryValue = null;
          let saveStateValue = null;

          if (boardStage && !document.getElementById("moveHistoryStrip")) {
            const historyStrip = document.createElement("div");
            historyStrip.id = "moveHistoryStrip";
            historyStrip.className = "move-history-strip";
            historyStrip.innerHTML =
              '<span class="move-history-label">MOVES</span>' +
              '<span id="moveHistoryValue" class="move-history-value">—</span>' +
              '<span id="saveStateValue" class="save-state">SAVE READY</span>';
            boardStage.insertAdjacentElement("afterend", historyStrip);
            moveHistoryValue = document.getElementById("moveHistoryValue");
            saveStateValue = document.getElementById("saveStateValue");
          } else {
            moveHistoryValue = document.getElementById("moveHistoryValue");
            saveStateValue = document.getElementById("saveStateValue");
          }

          function setSaveState(text) {
            if (saveStateValue) saveStateValue.textContent = text;
          }

          let capturedByBlack = document.getElementById("capturedByBlack");
          let capturedByWhite = document.getElementById("capturedByWhite");

          if (!capturedByBlack) {
            const blackPlayerCopy = document.querySelector(
              ".player-strip-top .player-copy"
            );
            if (blackPlayerCopy) {
              capturedByBlack = document.createElement("span");
              capturedByBlack.id = "capturedByBlack";
              capturedByBlack.className = "captured-pieces";
              capturedByBlack.textContent = "—";
              blackPlayerCopy.appendChild(capturedByBlack);
            }
          }

          if (!capturedByWhite) {
            const whitePlayerCopy = document.querySelector(
              ".player-strip-bottom .player-copy"
            );
            if (whitePlayerCopy) {
              capturedByWhite = document.createElement("span");
              capturedByWhite.id = "capturedByWhite";
              capturedByWhite.className = "captured-pieces";
              capturedByWhite.textContent = "—";
              whitePlayerCopy.appendChild(capturedByWhite);
            }
          }

          const initialPieceCounts = {
            Q: 1,
            R: 2,
            B: 2,
            N: 2,
            P: 8
          };

          function missingPieces(color) {
            const currentCounts = {
              Q: 0,
              R: 0,
              B: 0,
              N: 0,
              P: 0
            };

            if (!game || !game.board) return [];

            game.board.forEach((row) => {
              row.forEach((piece) => {
                if (
                  piece &&
                  piece.color === color &&
                  Object.prototype.hasOwnProperty.call(currentCounts, piece.type)
                ) {
                  currentCounts[piece.type] += 1;
                }
              });
            });

            const missing = [];
            ["Q", "R", "B", "N", "P"].forEach((type) => {
              const count = Math.max(
                0,
                initialPieceCounts[type] - currentCounts[type]
              );

              for (let index = 0; index < count; index += 1) {
                missing.push(PIECE_SYMBOLS[color + type]);
              }
            });

            return missing;
          }

          function updateCapturedPieces() {
            const whitePiecesLost = missingPieces("w");
            const blackPiecesLost = missingPieces("b");

            if (capturedByBlack) {
              capturedByBlack.textContent = whitePiecesLost.length
                ? whitePiecesLost.join("")
                : "—";
            }

            if (capturedByWhite) {
              capturedByWhite.textContent = blackPiecesLost.length
                ? blackPiecesLost.join("")
                : "—";
            }
          }

          function formatMove(move, index) {
            const moveNumber = Math.floor(index / 2) + 1;
            const prefix = index % 2 === 0 ? moveNumber + ". " : "… ";

            if (move.castle) {
              const castleText = move.castle.toLowerCase() === "q"
                ? "O-O-O"
                : "O-O";
              return prefix + castleText;
            }

            const separator = move.capture ? "×" : "–";
            const promotion = move.promotion ? "=" + move.promotion : "";
            return prefix + move.from.toUpperCase() + separator +
              move.to.toUpperCase() + promotion;
          }

          function updateMoveHistory() {
  if (!moveHistoryValue) return;

  const historyStripControl = document.getElementById("moveHistoryStrip");
  const historyLabel = historyStripControl
    ? historyStripControl.querySelector(".move-history-label")
    : null;

  if (!game || !game.history || game.history.length === 0) {
    moveHistoryValue.textContent = "—";
    if (historyLabel) historyLabel.textContent = "MOVES";
    return;
  }

  const start = historyExpanded
    ? 0
    : Math.max(0, game.history.length - 4);

  moveHistoryValue.textContent = game.history
    .slice(start)
    .map((move, offset) => formatMove(move, start + offset))
    .join("   ");

  if (historyLabel) {
    historyLabel.textContent = historyExpanded ? "ALL MOVES" : "MOVES";
  }
}

const moveHistoryStripControl = document.getElementById("moveHistoryStrip");

if (moveHistoryStripControl) {
  moveHistoryStripControl.style.cursor = "pointer";
  moveHistoryStripControl.setAttribute("role", "button");
  moveHistoryStripControl.setAttribute("tabindex", "0");
  moveHistoryStripControl.setAttribute(
    "aria-label",
    "棋譜の全手表示を切り替える"
  );

  function toggleMoveHistory() {
    if (!game || !game.history || game.history.length === 0) {
      showToast("NO MOVES YET");
      return;
    }

    historyExpanded = !historyExpanded;
    moveHistoryValue.style.overflowX = historyExpanded ? "auto" : "hidden";
    moveHistoryValue.style.textOverflow = historyExpanded ? "clip" : "ellipsis";
    moveHistoryValue.style.webkitOverflowScrolling = "touch";
    updateMoveHistory();

    if (historyExpanded) {
      setTimeout(() => {
        moveHistoryValue.scrollLeft = moveHistoryValue.scrollWidth;
      }, 0);
    } else {
      moveHistoryValue.scrollLeft = 0;
    }

    showToast(historyExpanded ? "FULL MOVE HISTORY" : "RECENT MOVES");
  }

  moveHistoryStripControl.addEventListener("click", toggleMoveHistory);
  moveHistoryStripControl.addEventListener("keydown", (event) => {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      toggleMoveHistory();
    }
  });
}

function difficultyText() {
            return easyMode ? "EASY" : "NORMAL";
          }

          function saveSignature() {
            if (!game) return "";
            return JSON.stringify({
              difficulty: difficultyText(),
              game
            });
          }

          function clearSavedGame() {
            try {
              localStorage.removeItem(saveKey);
              lastSavedSignature = "";
              setSaveState("SAVE READY");
            } catch (error) {
              console.warn("Saved game could not be cleared", error);
              setSaveState("SAVE ERROR");
            }
          }

          function saveCurrentGame() {
            try {
              if (
                !game ||
                game.over ||
                !game.history ||
                game.history.length === 0
              ) {
                if (!game || !game.history || game.history.length === 0) {
                  setSaveState("SAVE READY");
                }
                return false;
              }

              const signature = saveSignature();
              if (signature === lastSavedSignature) {
                return true;
              }

              localStorage.setItem(
                saveKey,
                JSON.stringify({
                  version: 3,
                  savedAt: Date.now(),
                  difficulty: difficultyText(),
                  game
                })
              );
              lastSavedSignature = signature;
              setSaveState("SAVED");
              return true;
            } catch (error) {
              console.warn("Game could not be saved", error);
              setSaveState("SAVE ERROR");
              return false;
            }
          }

          renderBoard = function patchedRenderBoard() {
            originalRenderBoard();
            updateMoveHistory();
            updateCapturedPieces();

            if (!game || !game.history || game.history.length === 0) {
              lastMove = null;
              return;
            }

            const latestMove = game.history[game.history.length - 1];
            lastMove = {
              from: latestMove.from,
              to: latestMove.to
            };

            [lastMove.from, lastMove.to].forEach((squareName) => {
              const square = document.querySelector(
                '.square[data-square="' + squareName + '"]'
              );
              if (square) square.classList.add("last-move");
            });
          };

          commitMove = function patchedCommitMove(move) {
            lastMove = {
              from: move.from,
              to: move.to
            };
            originalCommitMove(move);
            setTimeout(saveCurrentGame, 0);
          };

          showResult = function patchedShowResult(end) {
            clearSavedGame();
            originalShowResult(end);

            if (
              !end ||
              !end.over ||
              lastRecordedSessionId === gameSessionId
            ) {
              return;
            }

            lastRecordedSessionId = gameSessionId;

            if (end.winner === "w") {
              localRecord.wins += 1;
            } else if (end.winner === "b") {
              localRecord.losses += 1;
            } else {
              localRecord.draws += 1;
            }

            saveLocalRecord();
            renderLocalRecord();
          };

          const controls = document.querySelector(".game-controls");
          let difficultyButton = document.getElementById("difficultyButton");

          if (controls && !difficultyButton) {
            controls.style.gridTemplateColumns = "repeat(3, minmax(0, 1fr))";

            difficultyButton = document.createElement("button");
            difficultyButton.id = "difficultyButton";
            difficultyButton.className = "control-button active";
            difficultyButton.type = "button";
            difficultyButton.innerHTML =
              '<span class="control-label">LEVEL</span>' +
              '<span id="difficultyState" class="control-value">EASY</span>';

            controls.insertBefore(difficultyButton, controls.lastElementChild);
          }

          function renderDifficulty() {
            const difficultyState = document.getElementById("difficultyState");
            if (difficultyState) {
              difficultyState.textContent = difficultyText();
            }
            if (difficultyButton) {
              difficultyButton.classList.toggle("active", easyMode);
            }
          }

          if (difficultyButton) {
            difficultyButton.addEventListener("click", () => {
              easyMode = !easyMode;
              renderDifficulty();
              showToast(easyMode ? "CPU LEVEL — EASY" : "CPU LEVEL — NORMAL");
              setTimeout(saveCurrentGame, 0);
            });
          }

          const originalFlipButton = document.getElementById("flipBoardButton");
          let undoButton = null;

          if (originalFlipButton) {
            undoButton = originalFlipButton.cloneNode(true);
            originalFlipButton.replaceWith(undoButton);
            undoButton.textContent = "↶";
            undoButton.setAttribute("aria-label", "1ターン戻す");
            undoButton.style.opacity = "1";
            undoButton.style.cursor = "pointer";
          }

          function cleanMove(move) {
            return {
              from: move.from,
              to: move.to,
              promotion: move.promotion,
              enPassant: move.enPassant,
              castle: move.castle
            };
          }

          function undoPlayerTurn() {
            if (!game || !game.history || game.history.length === 0) {
              showToast("NO TURN TO UNDO");
              return;
            }

            if (pendingPromotion) {
              showToast("FINISH PROMOTION FIRST");
              return;
            }

            if (game.over) {
              showToast("GAME ALREADY ENDED");
              return;
            }

            const removeCount = game.turn === "b" || cpuThinking ? 1 : 2;
            const keepCount = Math.max(0, game.history.length - removeCount);
            const retainedMoves = game.history
              .slice(0, keepCount)
              .map(cleanMove);

            gameSessionId += 1;
            clearGameTimers();
            cpuThinking = false;
            selectedSquare = null;
            legalTargets = [];
            pendingPromotion = null;
            hidePromotion();
            hideResult();

            let rebuiltGame = createGameFromFen(START_FEN);
            retainedMoves.forEach((move) => {
              rebuiltGame = applyMove(rebuiltGame, move);
            });

            game = rebuiltGame;
            boardFlipped = false;
            renderBoard();

            if (game.history.length === 0) {
              clearSavedGame();
            } else {
              lastSavedSignature = "";
              saveCurrentGame();
            }

            showToast(removeCount === 1 ? "MOVE UNDONE" : "TURN UNDONE");
          }

          if (undoButton) {
            undoButton.addEventListener("click", undoPlayerTurn);
          }

          function restoreSavedGame() {
            let saved = null;

            try {
              saved = JSON.parse(localStorage.getItem(saveKey));
            } catch (error) {
              console.warn("Saved game could not be read", error);
              clearSavedGame();
              return false;
            }

            if (
              !saved ||
              saved.version !== 3 ||
              !saved.game ||
              !Array.isArray(saved.game.board) ||
              !Array.isArray(saved.game.history) ||
              saved.game.history.length === 0 ||
              saved.game.over
            ) {
              setSaveState("SAVE READY");
              return false;
            }

            easyMode = saved.difficulty !== "NORMAL";
            renderDifficulty();

            gameSessionId += 1;
            clearGameTimers();
            game = saved.game;
            game.over = false;
            selectedSquare = null;
            legalTargets = [];
            pendingPromotion = null;
            cpuThinking = false;
            boardFlipped = false;
            hidePromotion();
            hideResult();

            const home = document.getElementById("homeScreen");
            const gameView = document.getElementById("gameScreen");
            if (home) home.classList.remove("active");
            if (gameView) gameView.classList.add("active");

            renderBoard();
            lastSavedSignature = saveSignature();
            setSaveState("RESTORED");
            showToast("GAME RESTORED");

            if (game.turn === "b") {
              scheduleCpuMove();
            }

            return true;
          }

          const newGameButton = document.getElementById("localMatchButton");
          const rematch = document.getElementById("rematchButton");

          if (newGameButton) {
            newGameButton.addEventListener("click", clearSavedGame, true);
          }

          if (rematch) {
            rematch.addEventListener("click", clearSavedGame, true);
          }

          document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "hidden") {
              saveCurrentGame();
            }
          });

          window.addEventListener("pagehide", saveCurrentGame);
          window.addEventListener("beforeunload", saveCurrentGame);

          if (saveWatcher === null) {
            saveWatcher = setInterval(saveCurrentGame, 250);
          }

          cpuMove = function patchedCpuMove() {
            if (!easyMode) {
              originalCpuMove();
              return;
            }

            if (!game || game.over || game.turn !== "b") {
              cpuThinking = false;
              if (game) renderStatus();
              return;
            }

            try {
              const moves = legalMoves(game);

              if (!moves.length) {
                const end = gameEndState(game);
                game.over = end.over;
                cpuThinking = false;
                renderBoard();
                if (end.over) showResult(end);
                return;
              }

              const values = {
                P: 100,
                N: 320,
                B: 330,
                R: 500,
                Q: 900,
                K: 20000
              };

              function materialValue(state) {
                let score = 0;

                for (let r = 0; r < 8; r += 1) {
                  for (let c = 0; c < 8; c += 1) {
                    const piece = state.board[r][c];
                    if (!piece) continue;
                    const value = values[piece.type] || 0;
                    score += piece.color === "b" ? value : -value;
                  }
                }

                return score;
              }

              const scoredMoves = moves.map((move) => {
                const choice = {
                  ...move,
                  promotion: move.promotion ? "Q" : move.promotion
                };

                const afterCpu = applyMove(game, choice);
                const end = gameEndState(afterCpu);

                if (end.over && end.winner === "b") {
                  return { move: choice, score: 1000000 };
                }

                if (end.over) {
                  return { move: choice, score: 0 };
                }

                const whiteMoves = legalMoves(afterCpu);
                let worstReply = materialValue(afterCpu);

                if (isInCheck(afterCpu, "w")) {
                  worstReply += 24;
                }

                if (whiteMoves.length) {
                  worstReply = Infinity;

                  whiteMoves.forEach((whiteMove) => {
                    const whiteChoice = {
                      ...whiteMove,
                      promotion: whiteMove.promotion ? "Q" : whiteMove.promotion
                    };
                    const afterWhite = applyMove(afterCpu, whiteChoice);
                    const whiteEnd = gameEndState(afterWhite);
                    let replyScore = materialValue(afterWhite);

                    if (whiteEnd.over && whiteEnd.winner === "w") {
                      replyScore = -1000000;
                    } else if (whiteEnd.over) {
                      replyScore = 0;
                    }

                    worstReply = Math.min(worstReply, replyScore);
                  });
                }

                return { move: choice, score: worstReply };
              });

              scoredMoves.sort((a, b) => b.score - a.score);

              const poolSize = Math.min(
                scoredMoves.length,
                Math.max(4, Math.ceil(scoredMoves.length * 0.4))
              );
              const candidatePool = scoredMoves.slice(0, poolSize);
              const chosen = candidatePool[
                Math.floor(Math.random() * candidatePool.length)
              ].move;

              commitMove(chosen);
            } catch (error) {
              cpuThinking = false;
              console.error("Easy CPU move failed", error);
              renderStatus();
              showToast("CPU MOVE ERROR");
            }
          };

          boardFlipped = false;
          renderDifficulty();
          setSaveState("SAVE READY");
          restoreSavedGame();
        })();
      `;

      frameDocument.body.appendChild(patch);
    });
  </script>
</body>
</html>
