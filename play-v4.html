<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08090b">
  <title>CHESS STAGE — CPU SAVE V4</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #08090b;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100dvh;
      border: 0;
      background: #08090b;
    }
  </style>
</head>
<body>
  <iframe
    id="easyFrame"
    src="./easy.html?v=cpu-save-v4"
    title="CHESS STAGE"
  ></iframe>

  <script>
    const easyFrame = document.getElementById("easyFrame");
    const buildId = "cpu-save-v4";
    let indexCacheBusted = false;
    let installTimer = null;

    function injectPatch(gameDocument) {
      if (
        !gameDocument ||
        !gameDocument.body ||
        gameDocument.body.dataset.cpuSavePatch === buildId
      ) {
        return false;
      }

      const flipButton = gameDocument.getElementById("flipBoardButton");
      const difficultyButton = gameDocument.getElementById("difficultyButton");

      if (!flipButton || !difficultyButton) return false;

      gameDocument.body.dataset.cpuSavePatch = buildId;

      const patch = gameDocument.createElement("script");
      patch.textContent = `
        (() => {
          const saveKey = "chessStageSavedCpuGameV2";
          let lastSavedSnapshot = "";
          let saveTimer = null;

          const titleBlock = document.querySelector(".game-title-block");
          let saveState = document.getElementById("saveStateIndicator");

          if (titleBlock && !saveState) {
            saveState = document.createElement("span");
            saveState.id = "saveStateIndicator";
            saveState.className = "local-record";
            saveState.style.display = "block";
            saveState.style.marginTop = "3px";
            saveState.style.color = "rgba(183,167,121,0.82)";
            saveState.style.fontSize = "7px";
            saveState.style.fontWeight = "700";
            saveState.style.letterSpacing = "0.16em";
            titleBlock.appendChild(saveState);
          }

          function setSaveState(text) {
            if (saveState) saveState.textContent = text;
          }

          function getDifficulty() {
            const state = document.getElementById("difficultyState");
            return state ? state.textContent : "EASY";
          }

          function buildPayload() {
            return {
              version: 2,
              savedAt: Date.now(),
              difficulty: getDifficulty(),
              game
            };
          }

          function clearSavedGame() {
            try {
              localStorage.removeItem(saveKey);
              lastSavedSnapshot = "";
              setSaveState("SAVE READY");
            } catch (error) {
              console.warn("Saved game could not be cleared", error);
              setSaveState("SAVE ERROR");
            }
          }

          function saveNow() {
            try {
              if (
                !game ||
                game.over ||
                !game.history ||
                game.history.length === 0
              ) {
                return false;
              }

              const payload = buildPayload();
              const snapshot = JSON.stringify(payload);

              if (snapshot === lastSavedSnapshot) {
                return true;
              }

              localStorage.setItem(saveKey, snapshot);
              lastSavedSnapshot = snapshot;
              setSaveState("SAVED");
              return true;
            } catch (error) {
              console.warn("Game could not be saved", error);
              setSaveState("SAVE ERROR");
              return false;
            }
          }

          const originalFlipButton = document.getElementById("flipBoardButton");
          const undoButton = originalFlipButton.cloneNode(true);
          originalFlipButton.replaceWith(undoButton);

          undoButton.dataset.cpuUndoReady = "v4";
          undoButton.textContent = "↶";
          undoButton.setAttribute("aria-label", "1ターン戻す");
          undoButton.style.opacity = "1";
          undoButton.style.cursor = "pointer";

          boardFlipped = false;
          renderBoard();

          function cleanMove(move) {
            return {
              from: move.from,
              to: move.to,
              promotion: move.promotion,
              enPassant: move.enPassant,
              castle: move.castle
            };
          }

          function undoPlayerTurn() {
            if (!game || !game.history || game.history.length === 0) {
              showToast("NO TURN TO UNDO");
              return;
            }

            if (pendingPromotion) {
              showToast("FINISH PROMOTION FIRST");
              return;
            }

            if (game.over) {
              showToast("GAME ALREADY ENDED");
              return;
            }

            const removeCount = game.turn === "b" || cpuThinking ? 1 : 2;
            const keepCount = Math.max(0, game.history.length - removeCount);
            const retainedMoves = game.history
              .slice(0, keepCount)
              .map(cleanMove);

            gameSessionId += 1;
            clearGameTimers();
            cpuThinking = false;
            selectedSquare = null;
            legalTargets = [];
            pendingPromotion = null;
            hidePromotion();
            hideResult();

            let rebuiltGame = createGameFromFen(START_FEN);
            retainedMoves.forEach((move) => {
              rebuiltGame = applyMove(rebuiltGame, move);
            });

            game = rebuiltGame;
            boardFlipped = false;
            renderBoard();

            if (game.history.length === 0) {
              clearSavedGame();
            } else {
              lastSavedSnapshot = "";
              saveNow();
            }

            showToast(removeCount === 1 ? "MOVE UNDONE" : "TURN UNDONE");
          }

          undoButton.addEventListener("click", undoPlayerTurn);

          function restoreSavedGame() {
            let saved = null;

            try {
              saved = JSON.parse(localStorage.getItem(saveKey));
            } catch (error) {
              console.warn("Saved game could not be read", error);
              clearSavedGame();
              return false;
            }

            if (
              !saved ||
              saved.version !== 2 ||
              !saved.game ||
              !Array.isArray(saved.game.board) ||
              !Array.isArray(saved.game.history) ||
              saved.game.history.length === 0 ||
              saved.game.over
            ) {
              setSaveState("SAVE READY");
              return false;
            }

            const difficultyState = document.getElementById("difficultyState");
            const difficultyButton = document.getElementById("difficultyButton");

            if (
              saved.difficulty === "NORMAL" &&
              difficultyState &&
              difficultyState.textContent !== "NORMAL" &&
              difficultyButton
            ) {
              difficultyButton.click();
            }

            gameSessionId += 1;
            clearGameTimers();
            game = saved.game;
            game.over = false;
            selectedSquare = null;
            legalTargets = [];
            pendingPromotion = null;
            cpuThinking = false;
            boardFlipped = false;
            hidePromotion();
            hideResult();

            homeScreen.classList.remove("active");
            gameScreen.classList.add("active");
            renderBoard();

            lastSavedSnapshot = JSON.stringify(saved);
            setSaveState("RESTORED");
            showToast("GAME RESTORED");

            if (game.turn === "b") {
              scheduleCpuMove();
            }

            return true;
          }

          function startSaveWatcher() {
            if (saveTimer !== null) return;

            saveTimer = setInterval(() => {
              saveNow();
            }, 250);
          }

          document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "hidden") {
              saveNow();
            }
          });

          window.addEventListener("pagehide", saveNow);
          window.addEventListener("beforeunload", saveNow);

          const originalShowResultV4 = showResult;
          showResult = function patchedShowResultV4(end) {
            clearSavedGame();
            originalShowResultV4(end);
          };

          if (rematchButton) {
            rematchButton.addEventListener("click", clearSavedGame, true);
          }

          setSaveState("SAVE READY");
          restoreSavedGame();
          startSaveWatcher();
        })();
      `;

      gameDocument.body.appendChild(patch);
      return true;
    }

    function install() {
      try {
        const easyDocument = easyFrame.contentDocument;
        if (!easyDocument) return;

        const gameFrame = easyDocument.getElementById("gameFrame");
        if (!gameFrame) return;

        if (!indexCacheBusted) {
          indexCacheBusted = true;
          gameFrame.src = "./index.html?v=" + buildId;
          return;
        }

        const gameDocument = gameFrame.contentDocument;
        if (injectPatch(gameDocument)) {
          clearInterval(installTimer);
          installTimer = null;
        }
      } catch (error) {
        console.warn("CPU save V4 is still loading", error);
      }
    }

    easyFrame.addEventListener("load", install);
    installTimer = setInterval(install, 100);

    setTimeout(() => {
      if (installTimer) {
        clearInterval(installTimer);
        installTimer = null;
      }
    }, 10000);
  </script>
</body>
</html>
