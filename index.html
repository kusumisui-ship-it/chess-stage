<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#08090b">
  <meta name="description" content="CHESS STAGE — チェスのルールは変えない。体験を変える。オフラインテストビルド。">
  <title>CHESS STAGE — Offline Build</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="board-polish.css">
</head>
<body>
  <div id="appShell" class="app-shell">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <section id="mainScreen" class="screen active">
      <header class="top-header">
        <button id="brandButton" class="brand-button" type="button" aria-label="ホームへ">
          <span class="brand-mark">CS</span>
          <span class="brand-copy">
            <strong>CHESS STAGE</strong>
            <small>OFFLINE TEST BUILD</small>
          </span>
        </button>
        <span class="offline-chip"><i></i>OFFLINE</span>
      </header>

      <main id="viewRoot" class="view-root"></main>

      <nav class="bottom-nav" aria-label="メインナビゲーション">
        <button class="nav-button active" type="button" data-view="home">
          <span class="nav-icon">⌂</span><span>HOME</span>
        </button>
        <button class="nav-button" type="button" data-view="records">
          <span class="nav-icon">☷</span><span>RECORDS</span>
        </button>
        <button class="nav-button" type="button" data-view="learn">
          <span class="nav-icon">♙</span><span>LEARN</span>
        </button>
        <button class="nav-button" type="button" data-view="settings">
          <span class="nav-icon">⚙</span><span>SETTINGS</span>
        </button>
      </nav>
    </section>

    <section id="gameScreen" class="screen game-screen" aria-label="対局画面">
      <header class="game-header">
        <button id="leaveGameButton" class="icon-button" type="button" aria-label="対局を閉じる">←</button>
        <div class="game-title-block">
          <span id="gameModeLabel" class="game-mode-label">CPU MATCH</span>
          <strong id="gameStatus">WHITE TO MOVE</strong>
        </div>
        <button id="gameMenuButton" class="icon-button" type="button" aria-label="対局メニュー">•••</button>
      </header>

      <main class="game-main">
        <section id="topPlayer" class="player-strip">
          <div class="player-avatar" id="topPlayerAvatar">♚</div>
          <div class="player-copy">
            <strong id="topPlayerName">BLACK</strong>
            <span id="topCaptured" class="captured-line"></span>
          </div>
          <time id="topClock" class="player-clock">--:--</time>
        </section>

        <section class="board-stage">
          <div id="chessBoard" class="chess-board" role="grid" aria-label="チェス盤"></div>
          <div id="thinkingBadge" class="thinking-badge" aria-hidden="true"><i></i>THINKING</div>
        </section>

        <section id="bottomPlayer" class="player-strip">
          <div class="player-avatar" id="bottomPlayerAvatar">♔</div>
          <div class="player-copy">
            <strong id="bottomPlayerName">WHITE</strong>
            <span id="bottomCaptured" class="captured-line"></span>
          </div>
          <time id="bottomClock" class="player-clock active">--:--</time>
        </section>

        <section class="game-toolbar" aria-label="対局操作">
          <button id="undoButton" class="tool-button" type="button"><span>↶</span><small>UNDO</small></button>
          <button id="assistButton" class="tool-button active" type="button"><span>◎</span><small>ASSIST</small></button>
          <button id="flipBoardButton" class="tool-button" type="button"><span>↻</span><small>FLIP</small></button>
          <button id="claimDrawButton" class="tool-button" type="button" hidden><span>=</span><small>CLAIM</small></button>
        </section>

        <section class="move-panel collapsed">
          <div class="move-panel-head">
            <span>MOVE LIST</span>
            <div class="move-panel-actions">
              <button id="movePanelToggle" class="move-panel-toggle" type="button" aria-expanded="false">SHOW</button>
              <button id="copyPgnInlineButton" class="text-button" type="button">PGN COPY</button>
            </div>
          </div>
          <div id="moveList" class="move-list"><p class="empty-copy">対局を開始すると棋譜が表示されます。</p></div>
        </section>
      </main>
    </section>

    <div id="modalRoot" class="modal-root" aria-live="polite"></div>

    <div id="promotionOverlay" class="overlay" aria-hidden="true">
      <div class="dialog promotion-dialog" role="dialog" aria-modal="true" aria-labelledby="promotionTitle">
        <span class="eyebrow">PROMOTION</span>
        <h2 id="promotionTitle">昇格する駒を選択</h2>
        <div id="promotionChoices" class="promotion-choices"></div>
      </div>
    </div>

    <div id="resultOverlay" class="overlay" aria-hidden="true">
      <div class="dialog result-dialog" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
        <span id="resultLabel" class="eyebrow">GAME END</span>
        <h2 id="resultTitle">CHECKMATE</h2>
        <p id="resultDescription">WHITE WINS</p>
        <div id="resultSummary" class="result-summary"></div>
        <button id="rematchButton" class="primary-button full" type="button">REMATCH</button>
        <div class="dialog-actions">
          <button id="resultRecordsButton" class="secondary-button" type="button">RECORDS</button>
          <button id="resultHomeButton" class="secondary-button" type="button">HOME</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"><span id="toastText"></span></div>
  </div>

  <script src="engine-core.js"></script>
  <script src="engine-rules.js"></script>
  <script src="engine-ai.js"></script>
  <script src="app-core.js"></script>
  <script src="app-views.js"></script>
  <script src="app-game.js"></script>
  <script src="app-runtime.js"></script>
  <script src="app-board-polish.js"></script>
</body>
</html>
