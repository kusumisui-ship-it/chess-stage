name: Patch expandable move history

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-move-history.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Patch EASY CPU move history
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("easy.html")
          text = path.read_text(encoding="utf-8")

          text = text.replace(
              'src="./index.html?v=easy-integrated-v1"',
              'src="./index.html?v=easy-integrated-v2"',
          )
          text = text.replace(
              'if (frameDocument.body.dataset.easyIntegrated === "v1") return;',
              'if (frameDocument.body.dataset.easyIntegrated === "v2") return;',
          )
          text = text.replace(
              'frameDocument.body.dataset.easyIntegrated = "v1";',
              'frameDocument.body.dataset.easyIntegrated = "v2";',
          )
          text = text.replace(
              '          let saveWatcher = null;\n',
              '          let saveWatcher = null;\n          let historyExpanded = false;\n',
              1,
          )

          pattern = re.compile(
              r'          function updateMoveHistory\(\) \{.*?\n          \}\n\n          function difficultyText',
              re.S,
          )

          replacement = '''          function updateMoveHistory() {
            if (!moveHistoryValue) return;

            const historyStripControl = document.getElementById("moveHistoryStrip");
            const historyLabel = historyStripControl
              ? historyStripControl.querySelector(".move-history-label")
              : null;

            if (!game || !game.history || game.history.length === 0) {
              moveHistoryValue.textContent = "—";
              if (historyLabel) historyLabel.textContent = "MOVES";
              return;
            }

            const start = historyExpanded
              ? 0
              : Math.max(0, game.history.length - 4);

            moveHistoryValue.textContent = game.history
              .slice(start)
              .map((move, offset) => formatMove(move, start + offset))
              .join("   ");

            if (historyLabel) {
              historyLabel.textContent = historyExpanded ? "ALL MOVES" : "MOVES";
            }
          }

          const moveHistoryStripControl = document.getElementById("moveHistoryStrip");

          if (moveHistoryStripControl) {
            moveHistoryStripControl.style.cursor = "pointer";
            moveHistoryStripControl.setAttribute("role", "button");
            moveHistoryStripControl.setAttribute("tabindex", "0");
            moveHistoryStripControl.setAttribute(
              "aria-label",
              "棋譜の全手表示を切り替える"
            );

            function toggleMoveHistory() {
              if (!game || !game.history || game.history.length === 0) {
                showToast("NO MOVES YET");
                return;
              }

              historyExpanded = !historyExpanded;
              moveHistoryValue.style.overflowX = historyExpanded ? "auto" : "hidden";
              moveHistoryValue.style.textOverflow = historyExpanded ? "clip" : "ellipsis";
              moveHistoryValue.style.webkitOverflowScrolling = "touch";
              updateMoveHistory();

              if (historyExpanded) {
                setTimeout(() => {
                  moveHistoryValue.scrollLeft = moveHistoryValue.scrollWidth;
                }, 0);
              } else {
                moveHistoryValue.scrollLeft = 0;
              }

              showToast(historyExpanded ? "FULL MOVE HISTORY" : "RECENT MOVES");
            }

            moveHistoryStripControl.addEventListener("click", toggleMoveHistory);
            moveHistoryStripControl.addEventListener("keydown", (event) => {
              if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                toggleMoveHistory();
              }
            });
          }

          function difficultyText'''

          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit("Could not find updateMoveHistory block")

          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit patch
        run: |
          if git diff --quiet -- easy.html; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add easy.html
          git commit -m "Add expandable move history"
          git push
